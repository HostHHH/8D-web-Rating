<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Чергування - Class Hub</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            color: #333;
        }

        .header {
            background-color: #ffffff;
            padding: 15px 40px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
            display: flex;
            justify-content: center;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 1200px;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            color: #8da4c4;
            text-decoration: none;
            cursor: pointer;
            user-select: none;
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 30px;
            margin: 0;
            padding: 0;
        }

        .nav-links a {
            text-decoration: none;
            color: #6c757d;
            font-weight: 600;
            font-size: 1rem;
            transition: color 0.2s;
        }

        .nav-links a:hover, .nav-links a.active {
            color: #8da4c4;
        }

        .main-content {
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        .content-card {
            background: #ffffff;
            border-radius: 12px;
            width: 100%;
            max-width: 1000px;
            padding: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        }

        .schedule-header {
            margin-bottom: 30px;
        }

        .schedule-header h2 {
            margin: 0;
            color: #2b3a4a;
            font-size: 1.8rem;
        }

        .table-responsive {
            width: 100%;
            overflow-x: auto;
        }

        .schedule-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        .schedule-table th {
            padding: 15px 10px;
            color: #6c757d;
            font-size: 0.9rem;
            font-weight: 600;
            border-bottom: 2px solid #f0f2f5;
        }

        .schedule-table td {
            padding: 15px 10px;
            border-bottom: 1px solid #f0f2f5;
            color: #495057;
        }

        .status-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .status-pending { background-color: #e9ecef; color: #495057; }
        .status-today { background-color: #d1e7dd; color: #0f5132; }
        .status-done { background-color: #f8d7da; color: #842029; }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h3 {
            margin: 0;
            color: #2b3a4a;
        }

        .close-modal {
            cursor: pointer;
            font-size: 1.5rem;
            color: #6c757d;
        }

        #admin-form {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .admin-form-group {
            margin-bottom: 20px;
        }

        .admin-form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #495057;
        }

        .admin-form-group input[type="date"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ced4da;
            border-radius: 8px;
            box-sizing: border-box;
            font-family: inherit;
        }

        .draggable-list {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 350px;
            overflow-y: auto;
            border: 1px solid #ced4da;
            border-radius: 8px;
        }

        .draggable-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #ced4da;
            background: #fff;
            cursor: grab;
            transition: background-color 0.2s;
        }

        .draggable-item:last-child {
            border-bottom: none;
        }

        .draggable-item.dragging {
            opacity: 0.5;
            background: #f8f9fa;
        }

        .draggable-item.drag-over {
            border: 2px dashed #8da4c4;
            background: #f0f2f5;
        }

        .draggable-item > * {
            pointer-events: none;
        }

        .drag-date {
            font-weight: 600;
            width: 100px;
            color: #495057;
            font-size: 0.9rem;
        }

        .drag-duty {
            flex-grow: 1;
            font-size: 0.85rem;
            color: #6c757d;
        }

        .drag-handle {
            color: #adb5bd;
            font-size: 1.2rem;
            padding-left: 10px;
        }

        .save-btn {
            width: 100%;
            padding: 12px;
            background-color: #8da4c4;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            margin-top: 10px;
            transition: background-color 0.2s;
        }

        .save-btn:hover {
            background-color: #728bb3;
        }
    </style>
</head>
<body>
    <header class="header">
        <nav class="navbar">
            <a class="logo" id="secret-trigger">Class Hub</a>
            <ul class="nav-links" id="nav-links">
                <li><a href="index.html">Головна</a></li>
                <li><a href="Reyt.html">Рейтинг</a></li>
                <li><a href="profile.html">Особисті дані</a></li>
                <li><a href="Watch.html" class="active">Чергування</a></li>
            </ul>
        </nav>
    </header>
    
    <main class="main-content">
        <section class="content-card">
            <div class="schedule-header">
                <h2>Графік чергувань</h2>
            </div>
            <div class="table-responsive">
                <table class="schedule-table">
                    <thead>
                        <tr>
                            <th>Дата</th>
                            <th>День тижня</th>
                            <th>Черговий 1</th>
                            <th>Черговий 2</th>
                            <th>Статус</th>
                        </tr>
                    </thead>
                    <tbody id="schedule-tbody">
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <div class="modal-overlay" id="admin-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Редактор чергувань</h3>
                <span class="close-modal" id="close-modal">&times;</span>
            </div>
            <form id="admin-form">
                <div class="admin-form-group">
                    <label for="start-date-input">Дата початку (1-й день):</label>
                    <input type="date" id="start-date-input" required>
                </div>
                <div class="admin-form-group" style="flex-grow: 1; display: flex; flex-direction: column; overflow: hidden;">
                    <label>Порядок чергових (перетягніть для зміни):</label>
                    <ul id="admin-draggable-list" class="draggable-list"></ul>
                </div>
                <button type="submit" class="save-btn">Зберегти графік</button>
            </form>
        </div>
    </div>

    <script type="module" src="Watch.js"></script>
</body>
</html>
