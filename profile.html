<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Особисті дані</title>
    <link rel="stylesheet" href="profile.css">
    <link rel="stylesheet" href="Reyt.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <nav class="navbar">
            <a href="index.html" class="logo">Logo</a>
            
            <button class="mobile-menu-btn" id="mobile-menu-btn">
                <span></span>
                <span></span>
                <span></span>
            </button>

            <ul class="nav-links" id="nav-links">
                <li><a href="index.html">Основна сторінка</a></li>
                <li><a href="Reyt.html">Рейтинг</a></li>
                <li><a href="profile.html" class="active">Особисті дані</a></li>
            </ul>
        </nav>
    </header>
    
    <main class="main-content">
        <section class="content-card">
            <div class="rating-header">
                <h1>Профіль учня</h1>
                <div class="custom-select-wrapper">
                    <select id="student-profile-select" class="custom-select">
                        <option value="">Оберіть учня...</option>
                    </select>
                </div>
            </div>

            <div id="profile-container" class="profile-container" style="display: none;">
                <h2 id="profile-name" class="profile-name"></h2>
                
                <div class="stats-grid">
                    <div class="stat-box">
                        <span class="stat-label">Соціальні івенти</span>
                        <span id="stat-social" class="stat-value">0</span>
                    </div>
                    <div class="stat-box">
                        <span class="stat-label">Чергування</span>
                        <span id="stat-duty" class="stat-value">0</span>
                    </div>
                    <div class="stat-box">
                        <span class="stat-label">Події</span>
                        <span id="stat-events" class="stat-value">0</span>
                    </div>
                    <div class="stat-box">
                        <span class="stat-label">К-сть зауважень</span>
                        <span id="stat-remarks" class="stat-value danger">0</span>
                    </div>
                    <div class="stat-box highlight-box">
                        <span class="stat-label">Загальний бал</span>
                        <span id="stat-total" class="stat-value primary">0</span>
                    </div>
                </div>

                <div class="traits-container">
                    <div class="trait-card best">
                        <div class="trait-title">Найкраща сторона</div>
                        <div id="trait-best" class="trait-value"></div>
                    </div>
                    <div class="trait-card worst">
                        <div class="trait-title">Найгірша сторона</div>
                        <div id="trait-worst" class="trait-value"></div>
                    </div>
                </div>

                <div class="remarks-section">
                    <h3>Деталі зауважень</h3>
                    <ul id="profile-remarks-list" class="remarks-list"></ul>
                </div>
            </div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
